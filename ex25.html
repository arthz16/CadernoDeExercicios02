<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var int1 = parseInt(prompt("Qual seu primeiro numero inteiro"))
        var int2 = parseInt(prompt("Qual seu segundo numero inteiro"))

        var quoeciente = int1 / int2
        var resto = int1 % int2
        document.write("O resto: " + resto + "<br>")
        document.write("O quoeciente e: " + quoeciente )
    </script>
</body>
</html>
