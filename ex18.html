<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var comprimento = parseInt(prompt("Qual comprimento?"))
        var altura = parseInt(prompt("Qual sua altura?"))
        var largura = parseInt(prompt("Qual a largura?"))

        var volume = comprimento * largura * altura
        document.write("Valor do volume e: " + volume)
    </script>
</body>
</html>
