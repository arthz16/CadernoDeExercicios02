<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        var A = parseInt(prompt("Qual seu primeiro numero inteiro? "))
        var B = parseInt(prompt("Qual seu segundo numero inteiro?"))

        var quadrado = A + B**2

        document.write("A soma do quadrado e: " + quadrado)
        
    </script>
</body>
