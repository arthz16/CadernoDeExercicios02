<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
         var A = parseInt(prompt("Valor de A"))
         var B = parseInt(prompt("Valor de B"))

         var quadradoA = A**2
         var quadradoB = B**2
        var soma = quadradoA + quadradoB


         document.write("O Quadrado de A e: " + quadradoA + "<br>")
         document.write("O quadrado de B e: " + quadradoB + "<br>")
         document.write("A soma dos dois valores de quadrado lidos sao: " + soma)
    </script>
</body>
</html>
