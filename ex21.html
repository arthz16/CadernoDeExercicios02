<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
         var A = parseInt(prompt("Valor de A"))
         var B = parseInt(prompt("Valor de B"))

         var quadradoA = A * A
         var quadradoB = B * B

         document.write("O Quadrado de A e: " + quadradoA + "<br>")
         document.write("O quadrado de B e: " + quadradoB)
    </script>
</body>
</html>
